output_model_name: lewm
subdir: ${hydra:job.id}
cache_dir: ${hydra:runtime.cwd}/data/stablewm
num_workers: 6
train_split: 0.9
seed: 3072
img_size: 224
patch_size: 14
encoder_scale: tiny
dump_object: true
trainer:
  max_epochs: 100
  devices: auto
  accelerator: gpu
  precision: bf16
  gradient_clip_val: 1.0
logging:
  log_interval: 1
loader:
  batch_size: 128
  num_workers: ${num_workers}
  persistent_workers: true
  prefetch_factor: 3
  pin_memory: true
optimizer:
  type: AdamW
  lr: 5.0e-05
  weight_decay: 0.001
wm:
  type: lewm
  history_size: 3
  num_preds: 1
  embed_dim: 192
  action_dim: 2
  proprio_dim: 4
  state_dim: 7
predictor:
  depth: 6
  heads: 16
  mlp_dim: 2048
  dim_head: 64
  dropout: 0.1
  emb_dropout: 0.0
loss:
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024
data:
  dataset:
    num_steps: ${eval:'${wm.num_preds} + ${wm.history_size}'}
    frameskip: 5
    name: pusht_expert_train
    keys_to_load:
    - pixels
    - action
    - proprio
    - state
    keys_to_cache:
    - action
    - proprio
    - state
